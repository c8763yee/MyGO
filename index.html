<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <title>MyGO/Ave Mujica台詞搜尋</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" />
    <!-- 引入 Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- 引入 Font Awesome 用於圖標 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        min-height: 100vh;
        font-family: 'Noto Sans TC', sans-serif;
      }
      [data-bs-theme="dark"] body {
        background-color: #121212;
        color: #e0e0e0;
      }
      [data-bs-theme="light"] body {
        background-color: #f8f9fa;
        color: #212529;
      }
      
      /* 自定義 Navbar */
      .navbar {
        backdrop-filter: blur(10px);
        background-color: rgba(13, 110, 253, 0.85) !important;
        position: sticky;
        top: 0;
        z-index: 1030;
      }

      /* Sidebar 樣式提升 */
      #sidebar-wrapper {
        position: sticky;
        top: 72px;
        height: calc(100vh - 88px);
        overflow-y: auto;
      }

      .nav-tabs {
        border-bottom: none;
        gap: 0.5rem;
      }
      .nav-tabs .nav-link {
        border-radius: 0.5rem !important;
        border: 1px solid transparent;
        transition: all 0.3s ease;
      }
      [data-bs-theme="dark"] .nav-tabs .nav-link.active {
        background-color: #0d6efd;
        color: white;
        border-color: #0d6efd;
        box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
      }
      
      .tab-content {
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      [data-bs-theme="light"] .tab-content {
        background: rgba(255, 255, 255, 0.8);
        border-color: rgba(0, 0, 0, 0.1);
      }

      .card {
        border-radius: 1rem;
        border: none;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      }

      /* 行動端隱藏桌上型側邊欄 */
      @media (max-width: 767.98px) {
        #sidebar-column {
          display: none;
        }
      }
    </style>
    <!-- 自定義 CSS -->
    <link rel="stylesheet" href="static/index.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container-fluid">
        <button class="btn btn-outline-light d-md-none me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
          <i class="fas fa-bars"></i>
        </button>
        <a class="navbar-brand d-flex align-items-center" href="#">
          <i class="fas fa-search-plus me-2"></i>
          <span>MyGO/Ave Mujica 搜尋</span>
        </a>
        <div class="ms-auto d-flex align-items-center">
          <button class="btn btn-link text-light p-2" id="theme-toggle">
            <i class="fas fa-moon"></i>
          </button>
        </div>
      </div>
    </nav>

    <!-- Offcanvas 側邊欄 (行動端) -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar" aria-labelledby="mobileSidebarLabel">
      <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title" id="mobileSidebarLabel">搜尋選單</h5>
        <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body" id="offcanvas-content">
        <!-- 內容將由 JS 搬移或克隆 -->
      </div>
    </div>

    <div class="container-fluid">
      <div class="row">
        <!-- 左側欄位 (桌上型) -->
        <div class="col-md-3" id="sidebar-column">
          <div id="sidebar-wrapper" class="p-2">
            <div class="text-center mb-4">
              <img
                src="https://moe-counter.glitch.me/get/@ITHome-Ironman-2025-MyGO!!!!!?theme=moebooru"
                alt="Counter"
                class="img-fluid rounded"
              />
            </div>
            
            <div id="sidebar-container">
              <!-- Sidebar 內容移至此，方便在行動端與桌上型共享 -->
              <ul class="nav nav-tabs flex-column mb-3" role="tablist">
                <li class="nav-item">
                  <a class="nav-link active" data-bs-toggle="tab" href="#search" role="tab">
                    <i class="fas fa-search fa-fw me-2"></i>台詞搜尋
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" data-bs-toggle="tab" href="#frame" role="tab">
                    <i class="fas fa-image fa-fw me-2"></i>畫面提取
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" data-bs-toggle="tab" href="#gif" role="tab">
                    <i class="fas fa-film fa-fw me-2"></i>GIF/WebM
                  </a>
                </li>
              </ul>
              
              <div class="tab-content p-3 shadow-sm">
                <!-- Search 標籤 -->
                <div class="tab-pane fade show active" id="search" role="tabpanel">
                  <form id="search-form">
                    <div class="mb-3">
                      <label class="form-label small fw-bold text-uppercase">關鍵字</label>
                      <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-keyboard text-muted"></i></span>
                        <input type="text" class="form-control border-start-0" id="search-query" placeholder="輸入台詞關鍵字..." required />
                      </div>
                    </div>
                    <div class="row g-2 mb-3">
                      <div class="col-6">
                        <label class="form-label small fw-bold">系列</label>
                        <select class="form-select" id="search-video_name">
                          <option value="" selected>全部</option>
                          <option value="Ave Mujica">Ave Mujica</option>
                          <option value="MyGO">MyGO!!!!!</option>
                        </select>
                      </div>
                      <div class="col-6">
                        <label class="form-label small fw-bold">集數</label>
                        <select class="form-select" id="search-episode">
                          <option value="" selected>全部</option>
                          <script>
                            for(let i=1; i<=13; i++) document.write(`<option value="${i}">${i}</option>`);
                          </script>
                        </select>
                      </div>
                    </div>
                    <div class="mb-3">
                      <label class="form-label small fw-bold">每頁數量</label>
                      <input type="number" class="form-control" id="search-paged_by" value="20" min="1" />
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm">
                      <i class="fas fa-search me-2"></i>開始搜尋
                    </button>
                  </form>
                </div>

                <!-- Frame 標籤 -->
                <div class="tab-pane fade" id="frame" role="tabpanel">
                  <form id="frame-form">
                    <div class="mb-3">
                      <label class="form-label small fw-bold">系列</label>
                      <select class="form-select" id="frame-video_name" required>
                        <option value="" disabled selected>請選擇影片</option>
                        <option value="Ave Mujica">Ave Mujica</option>
                        <option value="MyGO">MyGO!!!!!</option>
                      </select>
                    </div>
                    <div class="mb-3">
                      <label class="form-label small fw-bold">集數</label>
                      <select class="form-select" id="frame-episode" required>
                        <option value="" disabled selected>請選擇集數</option>
                        <script>
                          for(let i=1; i<=13; i++) document.write(`<option value="${i}">${i}</option>`);
                        </script>
                      </select>
                    </div>
                    <div class="mb-3">
                      <label class="form-label small fw-bold">幀數</label>
                      <input type="number" class="form-control" id="frame-number" placeholder="輸入幀數..." required />
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                      <i class="fas fa-camera me-2"></i>提取畫面
                    </button>
                  </form>
                </div>

                <!-- GIF 標籤 -->
                <div class="tab-pane fade" id="gif" role="tabpanel">
                  <form id="gif-form">
                    <div class="mb-3">
                      <label class="form-label small fw-bold">系列</label>
                      <select class="form-select" id="gif-video_name" required>
                        <option value="" disabled selected>請選擇影片</option>
                        <option value="Ave Mujica">Ave Mujica</option>
                        <option value="MyGO">MyGO!!!!!</option>
                      </select>
                    </div>
                    <div class="mb-3">
                      <label class="form-label small fw-bold">集數</label>
                      <select class="form-select" id="gif-episode" required>
                        <option value="" disabled selected>請選擇集數</option>
                        <script>
                          for(let i=1; i<=13; i++) document.write(`<option value="${i}">${i}</option>`);
                        </script>
                      </select>
                    </div>
                    <div class="row g-2 mb-3">
                      <div class="col-6">
                        <label class="form-label small fw-bold">開始幀</label>
                        <input type="number" class="form-control" id="gif-start" required />
                      </div>
                      <div class="col-6">
                        <label class="form-label small fw-bold">結束幀</label>
                        <input type="number" class="form-control" id="gif-end" required />
                      </div>
                    </div>
                    <div class="mb-3">
                      <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="format" id="format-gif" value="gif" checked>
                        <label class="btn btn-outline-secondary" for="format-gif">GIF</label>
                        <input type="radio" class="btn-check" name="format" id="format-webm" value="webm">
                        <label class="btn btn-outline-secondary" for="format-webm">WebM</label>
                      </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3 py-2">
                      <i class="fas fa-magic me-2"></i>生成動畫
                    </button>

                    <!-- 生成結果預覽 -->
                    <div id="generated-webm-preview" style="display: none">
                      <div class="card bg-dark text-white mb-3">
                        <div class="card-body p-2">
                          <video id="generated-video" class="w-100 rounded" controls>
                            <source src="" type="video/webm" />
                          </video>
                          <button id="download-webm" class="btn btn-success btn-sm w-100 mt-2">
                            <i class="fas fa-download me-1"></i>下載 WebM
                          </button>
                        </div>
                      </div>
                    </div>

                    <!-- 影片即時預覽 -->
                    <div id="video-preview" style="display: none">
                      <div class="card border-primary">
                        <div class="card-header bg-primary text-white py-1 small">影片預覽</div>
                        <div class="card-body p-2">
                          <video id="video-player" class="w-100 rounded mb-2">
                            <source src="" type="video/webm" />
                          </video>
                          <div class="d-flex align-items-center gap-2">
                            <button type="button" id="play-pause" class="btn btn-primary btn-sm rounded-circle">
                              <i class="fas fa-play"></i>
                            </button>
                            <input type="range" class="form-range flex-grow-1" id="video-progress" value="0" disabled>
                          </div>
                          <div id="time-display" class="text-center x-small mt-1" style="font-size: 0.75rem;">0:00 / 0:00</div>
                        </div>
                      </div>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 右側顯示區域 -->
        <div class="col-md-9 col-sm-12">
          <div id="display-area" class="py-3">
            <div id="results-container">
              <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0" id="display-title">歡迎使用搜尋系統</h4>
                <div id="pagination-top"></div>
              </div>
              <div id="results-content" class="row g-4">
                <!-- 內容由 JS 動態生成 -->
                <div class="col-12 text-center py-5 text-muted">
                  <i class="fas fa-search fa-4x mb-3 opacity-25"></i>
                  <p>請在左側輸入關鍵字開始搜尋台詞</p>
                </div>
              </div>
              <div id="pagination-bottom" class="mt-5"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 引入 Bootstrap JS 和必要的依賴 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 自定義 JavaScript -->
    <script src="static/index.js"></script>
  </body>
</html>
