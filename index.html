<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <title>MyGO / Ave Mujica Archive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" />
    <!-- 引入 Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- 引入 Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- 引入 Google Fonts: Inter & Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- 自定義 CSS -->
    <link rel="stylesheet" href="static/index.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-lg sticky-top">
      <div class="container">
        <button class="btn btn-outline-light d-md-none me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
          <i class="fas fa-bars"></i>
        </button>
        <a class="navbar-brand d-flex align-items-center" href="#">
          <i class="fas fa-compact-disc fa-spin me-2" style="--fa-animation-duration: 3s;"></i>
          <span>MyGO / Ave Mujica Archive</span>
        </a>
        <div class="ms-auto d-flex align-items-center">
          <button class="btn btn-link text-light p-2" id="theme-toggle" aria-label="Toggle Theme">
            <i class="fas fa-moon"></i>
          </button>
        </div>
      </div>
    </nav>

    <!-- Offcanvas 側邊欄 (行動端) -->
    <div class="offcanvas offcanvas-start glass-panel border-0" tabindex="-1" id="mobileSidebar" aria-labelledby="mobileSidebarLabel">
      <div class="offcanvas-header border-bottom border-light border-opacity-10">
        <h5 class="offcanvas-title fw-bold" id="mobileSidebarLabel">搜尋選單</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body" id="offcanvas-content">
        <!-- 內容將由 JS 搬移 -->
      </div>
    </div>

    <div class="container mt-4 pb-5">
      <div class="row g-4">
        <!-- 左側欄位 (桌上型) -->
        <div class="col-md-4 col-lg-3 d-none d-md-block" id="sidebar-column">
          <div id="sidebar-wrapper" class="sticky-top" style="top: 100px;">
            <div id="sidebar-container" class="glass-panel p-4">
              <div class="text-center mb-4 pb-2 border-bottom border-light border-opacity-10">
                <img
                  src="https://moe-counter.glitch.me/get/@ITHome-Ironman-2025-MyGO!!!!!?theme=moebooru"
                  alt="Counter"
                  class="img-fluid rounded-3 opacity-75"
                />
              </div>
              
              <ul class="nav nav-tabs flex-column mb-3" role="tablist">
                <li class="nav-item">
                  <a class="nav-link active" data-bs-toggle="tab" href="#search" role="tab">
                    <i class="fas fa-search fa-fw me-2"></i>台詞搜尋
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" data-bs-toggle="tab" href="#frame" role="tab">
                    <i class="fas fa-image fa-fw me-2"></i>畫面提取
                  </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" data-bs-toggle="tab" href="#gif" role="tab">
                    <i class="fas fa-film fa-fw me-2"></i>GIF/WebM
                  </a>
                </li>
              </ul>
              
              <div class="tab-content border-0 bg-transparent">
                <!-- Search 標籤 -->
                <div class="tab-pane fade show active" id="search" role="tabpanel">
                  <form id="search-form" class="mt-2">
                    <div class="mb-4">
                      <label class="form-label small fw-bold text-uppercase tracking-wider opacity-75">關鍵字搜尋</label>
                      <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0"><i class="fas fa-keyboard opacity-50"></i></span>
                        <input type="text" class="form-control border-start-0" id="search-query" placeholder="輸入台詞關鍵字..." required />
                      </div>
                    </div>
                    <div class="row g-3 mb-4">
                      <div class="col-6">
                        <label class="form-label small fw-bold opacity-75">系列</label>
                        <select class="form-select" id="search-video_name">
                          <option value="" selected>全部</option>
                          <option value="Ave Mujica">Ave Mujica</option>
                          <option value="MyGO">MyGO!!!!!</option>
                        </select>
                      </div>
                      <div class="col-6">
                        <label class="form-label small fw-bold opacity-75">集數</label>
                        <select class="form-select" id="search-episode">
                          <option value="" selected>全部</option>
                          <script>
                            for(let i=1; i<=13; i++) document.write(`<option value="${i}">${i}</option>`);
                          </script>
                        </select>
                      </div>
                    </div>
                    <div class="mb-4">
                      <label class="form-label small fw-bold opacity-75">每頁數量</label>
                      <input type="number" class="form-control" id="search-paged_by" value="20" min="1" />
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 shadow-sm">
                      <i class="fas fa-search me-2"></i>開始搜尋
                    </button>
                  </form>
                </div>

                <!-- Frame 標籤 -->
                <div class="tab-pane fade" id="frame" role="tabpanel">
                  <form id="frame-form" class="mt-2">
                    <div class="mb-3">
                      <label class="form-label small fw-bold opacity-75">系列</label>
                      <select class="form-select" id="frame-video_name" required>
                        <option value="" disabled selected>請選擇影片</option>
                        <option value="Ave Mujica">Ave Mujica</option>
                        <option value="MyGO">MyGO!!!!!</option>
                      </select>
                    </div>
                    <div class="mb-3">
                      <label class="form-label small fw-bold opacity-75">集數</label>
                      <select class="form-select" id="frame-episode" required>
                        <option value="" disabled selected>請選擇集數</option>
                        <script>
                          for(let i=1; i<=13; i++) document.write(`<option value="${i}">${i}</option>`);
                        </script>
                      </select>
                    </div>
                    <div class="mb-4">
                      <label class="form-label small fw-bold opacity-75">幀數</label>
                      <input type="number" class="form-control" id="frame-number" placeholder="輸入幀數..." required />
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3">
                      <i class="fas fa-camera me-2"></i>提取畫面
                    </button>
                  </form>
                </div>

                <!-- GIF 標籤 -->
                <div class="tab-pane fade" id="gif" role="tabpanel">
                  <form id="gif-form" class="mt-2">
                    <div class="mb-3">
                      <label class="form-label small fw-bold opacity-75">系列</label>
                      <select class="form-select" id="gif-video_name" required>
                        <option value="" disabled selected>請選擇影片</option>
                        <option value="Ave Mujica">Ave Mujica</option>
                        <option value="MyGO">MyGO!!!!!</option>
                      </select>
                    </div>
                    <div class="mb-3">
                      <label class="form-label small fw-bold opacity-75">集數</label>
                      <select class="form-select" id="gif-episode" required>
                        <option value="" disabled selected>請選擇集數</option>
                        <script>
                          for(let i=1; i<=13; i++) document.write(`<option value="${i}">${i}</option>`);
                        </script>
                      </select>
                    </div>
                    <div class="row g-2 mb-3">
                      <div class="col-6">
                        <label class="form-label small fw-bold opacity-75">開始幀</label>
                        <input type="number" class="form-control" id="gif-start" required />
                      </div>
                      <div class="col-6">
                        <label class="form-label small fw-bold opacity-75">結束幀</label>
                        <input type="number" class="form-control" id="gif-end" required />
                      </div>
                    </div>
                    <div class="mb-4">
                      <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="format" id="format-gif" value="gif" checked>
                        <label class="btn btn-outline-secondary" for="format-gif">GIF</label>
                        <input type="radio" class="btn-check" name="format" id="format-webm" value="webm">
                        <label class="btn btn-outline-secondary" for="format-webm">WebM</label>
                      </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 mb-4">
                      <i class="fas fa-magic me-2"></i>生成動畫
                    </button>

                    <!-- 影片即時預覽 -->
                    <div id="video-preview" style="display: none">
                      <div class="glass-panel p-2 mb-3">
                        <div class="text-uppercase small fw-bold mb-2 opacity-50 px-2" style="font-size: 0.65rem;">Live Preview</div>
                        <video id="video-player" class="w-100 rounded-3 mb-2">
                          <source src="" type="video/webm" />
                        </video>
                        <div class="px-2 pb-2">
                          <div class="d-flex align-items-center gap-3">
                            <button type="button" id="play-pause" class="btn btn-sm btn-primary rounded-circle p-0" style="width: 32px; height: 32px;">
                              <i class="fas fa-play" style="font-size: 0.8rem;"></i>
                            </button>
                            <input type="range" class="form-range flex-grow-1" id="video-progress" value="0" disabled>
                          </div>
                          <div id="time-display" class="text-end text-muted mt-1" style="font-size: 0.7rem;">0:00 / 0:00</div>
                        </div>
                      </div>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 右側顯示區域 -->
        <div class="col-md-8 col-lg-9">
          <div id="display-area">
            <div id="results-container">
              <div class="d-flex justify-content-between align-items-end mb-4 px-2">
                <div>
                  <h2 class="hero-text mb-1" id="display-title">BanG Dream! Archive</h2>
                  <p class="text-muted small mb-0 opacity-75">探索迷茫與華麗的樂章台詞</p>
                </div>
                <div id="pagination-top"></div>
              </div>
              <div id="results-content" class="row g-4">
                <!-- 內容由 JS 動態生成 -->
                <div class="col-12 text-center py-5 fade-in">
                  <div class="glass-panel d-inline-block p-5">
                    <i class="fas fa-search fa-4x mb-4 opacity-25 text-primary"></i>
                    <h3 class="fw-bold mb-3">準備好開始了嗎？</h3>
                    <p class="text-muted">在左側輸入關鍵字，找尋那些觸動靈魂的瞬間。</p>
                  </div>
                </div>
              </div>
              <div id="pagination-bottom" class="mt-5"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 引入 Bootstrap JS 和必要的依賴 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 自定義 JavaScript -->
    <script src="static/index.js"></script>
  </body>
</html>
